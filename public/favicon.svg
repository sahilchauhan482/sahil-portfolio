<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0b10" />
      <stop offset="100%" stop-color="#030406" />
    </linearGradient>
    
    <!-- Text Glow & Gradient -->
    <linearGradient id="sc-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" /> <!-- Cyan -->
      <stop offset="100%" stop-color="#8b5cf6" /> <!-- Violet -->
    </linearGradient>
    
    <!-- Outer Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Smooth rounded square container -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bg-grad)" stroke="#22d3ee" stroke-width="8" stroke-opacity="0.3" />

  <!-- Neon Accent Rings/Arcs -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="url(#sc-grad)" stroke-width="4" stroke-opacity="0.15" />
  
  <!-- Glowing Tech Dots -->
  <circle cx="100" cy="100" r="12" fill="#22d3ee" filter="url(#glow)" opacity="0.8" />
  <circle cx="412" cy="412" r="8" fill="#8b5cf6" filter="url(#glow)" opacity="0.6" />

  <!-- Monogram text SC -->
  <text 
    x="50%" 
    y="56%" 
    font-family="system-ui, -apple-system, sans-serif" 
    font-weight="900" 
    font-size="200" 
    fill="url(#sc-grad)" 
    text-anchor="middle" 
    dominant-baseline="middle"
    filter="url(#glow)"
    letter-spacing="-10"
  >SC</text>
  
  <!-- Sleek Dot next to SC -->
  <circle cx="395" cy="315" r="16" fill="#8b5cf6" filter="url(#glow)" />
</svg>
